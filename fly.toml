cd ~/mwe-whatsapp-bot

cat > fly.toml << 'EOF'
app = "mahawilachchiyabot"
primary_region = "sin"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[env]
  PORT = "3000"

[mounts]
  source = "auth_data"
  destination = "/app/auth_info"
EOF
