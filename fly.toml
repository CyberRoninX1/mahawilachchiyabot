app = "mwe-whatsapp-bot"
primary_region = "sin"

[build]
  [build.args]
    NODE_VERSION = "18"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[mounts]
  source = "auth_data"
  destination = "/app/auth_info"

[env]
  NODE_ENV = "production"
